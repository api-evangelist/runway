naftiko: "1.0.0-alpha1"

info:
  label: "Runway Characters API"
  description: "Runway Characters API for real-time conversational avatars - avatar management, WebRTC sessions, and knowledge documents."
  tags:
    - Runway
    - Avatars
    - Characters
    - Conversational AI
    - WebRTC
    - Real Time
    - GWM-1
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      RUNWAY_API_KEY: RUNWAY_API_KEY

capability:
  consumes:
    - type: http
      namespace: runway-characters
      baseUri: "https://api.dev.runwayml.com/v1"
      description: "Runway Characters API for conversational avatars"
      authentication:
        type: bearer
        token: "{{env.RUNWAY_API_KEY}}"
      resources:
        - name: avatars
          path: /avatars
          description: "Create and manage persistent avatar personas"
          operations:
            - name: create-avatar
              method: POST
              description: "Create a new avatar with appearance, voice, and personality"
              inputParameters:
                - name: X-Runway-Version
                  in: header
                  type: string
                  required: true
                  description: "API version header (2024-11-06)"
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  referenceImage: "{{tools.referenceImage}}"
                  personality: "{{tools.personality}}"
                  voice: "{{tools.voice}}"
                  openingMessage: "{{tools.openingMessage}}"
                  documentIds: "{{tools.documentIds}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: realtime-sessions
          path: /realtime_sessions
          description: "Create WebRTC sessions for live avatar conversations"
          operations:
            - name: create-session
              method: POST
              description: "Create a realtime WebRTC session"
              inputParameters:
                - name: X-Runway-Version
                  in: header
                  type: string
                  required: true
                  description: "API version header"
              body:
                type: json
                data:
                  model: "{{tools.model}}"
                  avatar: "{{tools.avatar}}"
                  maxSessionDurationSeconds: "{{tools.maxSessionDurationSeconds}}"
                  personality: "{{tools.personality}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: documents
          path: /documents
          description: "Upload knowledge documents for avatars"
          operations:
            - name: create-document
              method: POST
              description: "Upload a knowledge document"
              inputParameters:
                - name: X-Runway-Version
                  in: header
                  type: string
                  required: true
                  description: "API version header"
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  content: "{{tools.content}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: document
          path: /documents/{id}
          description: "Manage individual knowledge documents"
          operations:
            - name: delete-document
              method: DELETE
              description: "Delete a knowledge document"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Document UUID"
                - name: X-Runway-Version
                  in: header
                  type: string
                  required: true
                  description: "API version header"

  exposes:
    - type: rest
      port: 8104
      namespace: runway-characters-rest
      resources:
        - path: /v1/avatars
          name: avatars
          description: "Avatar management"
          operations:
            - method: POST
              name: create-avatar
              description: "Create an avatar"
              call: "runway-characters.create-avatar"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/sessions
          name: sessions
          description: "Realtime session management"
          operations:
            - method: POST
              name: create-session
              description: "Create a WebRTC session"
              call: "runway-characters.create-session"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9104
      namespace: runway-characters-mcp
      transport: http
      tools:
        - name: create-avatar
          description: "Create a new Runway conversational avatar with custom appearance, voice, and personality"
          hints:
            readOnly: false
            openWorld: false
          call: "runway-characters.create-avatar"
          with:
            name: "tools.name"
            referenceImage: "tools.referenceImage"
            personality: "tools.personality"
            voice: "tools.voice"
            openingMessage: "tools.openingMessage"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-realtime-session
          description: "Start a WebRTC realtime session connecting a user to a Runway avatar"
          hints:
            readOnly: false
            openWorld: false
          call: "runway-characters.create-session"
          with:
            model: "tools.model"
            avatar: "tools.avatar"
            maxSessionDurationSeconds: "tools.maxSessionDurationSeconds"
          outputParameters:
            - type: object
              mapping: "$."
        - name: upload-knowledge-document
          description: "Upload a knowledge document that an avatar can reference during conversations"
          hints:
            readOnly: false
            openWorld: false
          call: "runway-characters.create-document"
          with:
            name: "tools.name"
            content: "tools.content"
          outputParameters:
            - type: object
              mapping: "$."
