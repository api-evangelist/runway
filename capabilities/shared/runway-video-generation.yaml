naftiko: "1.0.0-alpha1"

info:
  label: "Runway Video Generation API"
  description: "Runway video generation API - text-to-video, image-to-video, video-to-video, character performance, lip sync, video upscale, frame interpolation, and sound effect generation."
  tags:
    - Runway
    - Video Generation
    - Artificial Intelligence
    - Generative AI
    - Gen-4
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      RUNWAY_API_KEY: RUNWAY_API_KEY

capability:
  consumes:
    - type: http
      namespace: runway-video
      baseUri: "https://api.dev.runwayml.com/v1"
      description: "Runway video generation API"
      authentication:
        type: bearer
        token: "{{env.RUNWAY_API_KEY}}"
      resources:
        - name: image-to-video
          path: /image_to_video
          description: "Generate video from an input image"
          operations:
            - name: create-image-to-video
              method: POST
              description: "Create image-to-video generation task"
              inputParameters:
                - name: X-Runway-Version
                  in: header
                  type: string
                  required: true
                  description: "API version header (2024-11-06)"
              body:
                type: json
                data:
                  model: "{{tools.model}}"
                  promptImage: "{{tools.promptImage}}"
                  promptText: "{{tools.promptText}}"
                  duration: "{{tools.duration}}"
                  ratio: "{{tools.ratio}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: text-to-video
          path: /text_to_video
          description: "Generate video from text prompt only"
          operations:
            - name: create-text-to-video
              method: POST
              description: "Create text-to-video generation task"
              inputParameters:
                - name: X-Runway-Version
                  in: header
                  type: string
                  required: true
                  description: "API version header"
              body:
                type: json
                data:
                  model: "{{tools.model}}"
                  promptText: "{{tools.promptText}}"
                  duration: "{{tools.duration}}"
                  ratio: "{{tools.ratio}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: video-to-video
          path: /video_to_video
          description: "Transform existing video with text guidance"
          operations:
            - name: create-video-to-video
              method: POST
              description: "Create video-to-video generation task"
              inputParameters:
                - name: X-Runway-Version
                  in: header
                  type: string
                  required: true
                  description: "API version header"
              body:
                type: json
                data:
                  model: "{{tools.model}}"
                  promptVideo: "{{tools.promptVideo}}"
                  promptText: "{{tools.promptText}}"
                  ratio: "{{tools.ratio}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: character-performance
          path: /character_performance
          description: "Animate characters using reference performance video"
          operations:
            - name: create-character-performance
              method: POST
              description: "Create character performance (Act Two) task"
              inputParameters:
                - name: X-Runway-Version
                  in: header
                  type: string
                  required: true
                  description: "API version header"
              body:
                type: json
                data:
                  model: "{{tools.model}}"
                  character: "{{tools.character}}"
                  reference: "{{tools.reference}}"
                  ratio: "{{tools.ratio}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: lip-sync
          path: /lip_sync
          description: "Animate face to speak audio"
          operations:
            - name: create-lip-sync
              method: POST
              description: "Create lip sync generation task"
              inputParameters:
                - name: X-Runway-Version
                  in: header
                  type: string
                  required: true
                  description: "API version header"
              body:
                type: json
                data:
                  model: "{{tools.model}}"
                  input: "{{tools.input}}"
                  audio: "{{tools.audio}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: video-upscale
          path: /video_upscale
          description: "Upscale video resolution"
          operations:
            - name: create-video-upscale
              method: POST
              description: "Create video upscale task"
              inputParameters:
                - name: X-Runway-Version
                  in: header
                  type: string
                  required: true
                  description: "API version header"
              body:
                type: json
                data:
                  model: "{{tools.model}}"
                  videoUri: "{{tools.videoUri}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: frame-interpolation
          path: /frame_interpolation
          description: "Interpolate video frames for smoother motion"
          operations:
            - name: create-frame-interpolation
              method: POST
              description: "Create frame interpolation task"
              inputParameters:
                - name: X-Runway-Version
                  in: header
                  type: string
                  required: true
                  description: "API version header"
              body:
                type: json
                data:
                  model: "{{tools.model}}"
                  videoUri: "{{tools.videoUri}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: sound-effect
          path: /sound_effect
          description: "Generate AI sound effects for video"
          operations:
            - name: create-sound-effect
              method: POST
              description: "Create sound effect generation task"
              inputParameters:
                - name: X-Runway-Version
                  in: header
                  type: string
                  required: true
                  description: "API version header"
              body:
                type: json
                data:
                  model: "{{tools.model}}"
                  promptText: "{{tools.promptText}}"
                  videoUri: "{{tools.videoUri}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: tasks
          path: /tasks/{id}
          description: "Task status and management"
          operations:
            - name: get-task
              method: GET
              description: "Get task status and output"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Task UUID"
                - name: X-Runway-Version
                  in: header
                  type: string
                  required: true
                  description: "API version header"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-task
              method: DELETE
              description: "Cancel or delete a task"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Task UUID"
                - name: X-Runway-Version
                  in: header
                  type: string
                  required: true
                  description: "API version header"

        - name: uploads
          path: /uploads
          description: "Upload media files for use in generation requests"
          operations:
            - name: create-upload
              method: POST
              description: "Upload a temporary media file"
              inputParameters:
                - name: X-Runway-Version
                  in: header
                  type: string
                  required: true
                  description: "API version header"
              body:
                type: json
                data:
                  filename: "{{tools.filename}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8102
      namespace: runway-video-rest
      resources:
        - path: /v1/video-tasks
          name: video-tasks
          description: "Video generation task management"
          operations:
            - method: POST
              name: create-text-to-video
              description: "Create text-to-video task"
              call: "runway-video.create-text-to-video"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/tasks/{id}
          name: task
          description: "Task status polling"
          operations:
            - method: GET
              name: get-task
              description: "Get task status"
              call: "runway-video.get-task"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9102
      namespace: runway-video-mcp
      transport: http
      tools:
        - name: create-text-to-video
          description: "Generate a video from a text prompt using Runway Gen-4.5 or Veo models"
          hints:
            readOnly: false
            openWorld: false
          call: "runway-video.create-text-to-video"
          with:
            model: "tools.model"
            promptText: "tools.promptText"
            duration: "tools.duration"
            ratio: "tools.ratio"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-image-to-video
          description: "Generate a video from an input image using Runway Gen-4 models"
          hints:
            readOnly: false
            openWorld: false
          call: "runway-video.create-image-to-video"
          with:
            model: "tools.model"
            promptImage: "tools.promptImage"
            promptText: "tools.promptText"
            duration: "tools.duration"
            ratio: "tools.ratio"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-task-status
          description: "Poll the status of a Runway generation task until it succeeds or fails"
          hints:
            readOnly: true
            openWorld: true
          call: "runway-video.get-task"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
