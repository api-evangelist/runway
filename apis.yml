aid: runway
url: https://raw.githubusercontent.com/api-evangelist/runway/refs/heads/main/apis.yml
apis:
  - aid: runway:video-generation-api
    name: Runway Video Generation API
    tags:
      - Video
      - Generation
      - Artificial Intelligence
      - Machine Learning
      - Text To Video
      - Image To Video
      - Generative AI
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.dev.runwayml.com
    humanURL: https://docs.dev.runwayml.com/guides/using-the-api/
    properties:
      - url: https://docs.dev.runwayml.com/api/
        type: Documentation
      - url: openapi/runway-video-generation-openapi.yml
        type: OpenAPI
    description: >-
      The Runway Video Generation API allows developers to generate videos from
      text prompts, images, or existing videos using Runway's Gen-4 and Gen-4.5
      models. The API supports text-to-video, image-to-video, and video-to-video
      generation workflows, producing 5-8 second video clips. Tasks are processed
      asynchronously, with developers submitting generation requests and polling
      for results using unique task identifiers. Authentication is handled via
      Bearer token in the HTTP Authorization header.
  - aid: runway:image-generation-api
    name: Runway Image Generation API
    tags:
      - Images
      - Generation
      - Artificial Intelligence
      - Machine Learning
      - Text To Image
      - Generative AI
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.dev.runwayml.com
    humanURL: https://runwayml.com/news/introducing-runway-api-for-gen-4-images
    properties:
      - url: https://docs.dev.runwayml.com/api/
        type: Documentation
      - url: openapi/runway-image-generation-openapi.yml
        type: OpenAPI
    description: >-
      The Runway Image Generation API provides a text-to-image endpoint that
      enables developers to generate high-quality images from text prompts using
      Runway's Gen-4 model. The API accepts text descriptions and produces images
      as output, allowing integration of AI-powered image generation into
      applications, products, and platforms. Like the video API, it uses
      asynchronous task processing and Bearer token authentication.
  - aid: runway:characters-api
    name: Runway Characters API
    tags:
      - Avatars
      - Characters
      - Conversational AI
      - Real Time
      - WebRTC
      - Video Agents
      - Generative AI
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.dev.runwayml.com
    humanURL: https://docs.dev.runwayml.com/characters/
    properties:
      - url: https://docs.dev.runwayml.com/characters/
        type: Documentation
      - url: openapi/runway-characters-openapi.yml
        type: OpenAPI
      - url: asyncapi/runway-characters-asyncapi.yml
        type: AsyncAPI
    description: >-
      The Runway Characters API enables developers to build real-time
      conversational avatars powered by GWM-1, Runway's General World Model.
      Characters are fully custom conversational video agents that can be created
      from a single image with no fine-tuning required, supporting photorealistic
      or animated styles, human or non-human appearances. The API uses WebRTC
      sessions for live conversations with up to 5-minute duration, and includes
      a Documents API for uploading domain-specific knowledge that avatars can
      reference during interactions.
  - aid: runway:python-sdk
    name: Runway Python SDK
    tags:
      - Python
      - SDK
      - Libraries
      - Artificial Intelligence
      - Video Generation
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.dev.runwayml.com
    humanURL: https://docs.dev.runwayml.com/api-details/sdks/
    properties:
      - url: https://docs.dev.runwayml.com/api-details/sdks/
        type: Documentation
    description: >-
      The Runway Python SDK provides a convenient Python library for interacting
      with the Runway API. It includes type annotations compatible with MyPy and
      supports Python 3.8 and above. The SDK can be installed via pip and offers
      type safety, automatic retries, and best-practice error handling to simplify
      integration of Runway's video and image generation capabilities into Python
      applications and workflows.
  - aid: runway:node-sdk
    name: Runway Node.js SDK
    tags:
      - Node.js
      - JavaScript
      - TypeScript
      - SDK
      - Libraries
      - Video Generation
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.dev.runwayml.com
    humanURL: https://docs.dev.runwayml.com/api-details/sdks/
    properties:
      - url: https://docs.dev.runwayml.com/api-details/sdks/
        type: Documentation
    description: >-
      The Runway Node.js SDK provides a JavaScript and TypeScript library for
      interacting with the Runway API. It includes TypeScript bindings for type
      safety and is compatible with Node.js 18 and above. The SDK can be installed
      via npm, yarn, or pnpm, and provides automatic retries and best-practice
      error handling to streamline integration of Runway's generative AI
      capabilities into JavaScript and TypeScript applications.
